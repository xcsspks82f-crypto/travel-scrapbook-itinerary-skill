<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1600" viewBox="0 0 900 1600" role="img" aria-labelledby="title desc">
  <title id="title">Suzhou one-night travel scrapbook demo</title>
  <desc id="desc">A public-safe 9:16 travel flow scrapbook demo without private character IP.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="#f7f1e5"/>
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#ded3bd" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#7a6a55" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; font-weight: 800; fill: #121212; }
      .hand { font-family: "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #151515; }
      .small { font-size: 28px; }
      .body { font-size: 34px; }
      .card-title { font-size: 30px; font-weight: 800; }
      .muted { fill: #5f665f; }
      .route { fill: none; stroke: #747474; stroke-width: 12; stroke-linecap: round; stroke-dasharray: 18 20; }
      .sticker { fill: #ffffff; stroke: #ffffff; stroke-width: 14; filter: url(#shadow); }
      .blue { fill: #b9c9ee; }
      .yellow { fill: #f5dfae; }
      .red { fill: #b85142; }
      .green { fill: #96aa72; }
      .cream { fill: #fff7e8; stroke: #d8c7a7; stroke-width: 3; }
    </style>
  </defs>

  <rect width="900" height="1600" fill="url(#grid)"/>

  <path class="route" d="M 180 270 C 600 280, 700 430, 540 560 S 230 740, 370 920 S 730 1030, 610 1240 S 280 1320, 210 1460"/>

  <g transform="translate(260 58)">
    <rect class="red" x="0" y="0" rx="36" ry="36" width="320" height="120"/>
    <text class="title" x="160" y="82" text-anchor="middle" font-size="70" fill="#fff">Day 1-2</text>
  </g>
  <g transform="translate(115 198)">
    <rect class="yellow" x="0" y="0" rx="38" ry="38" width="670" height="92"/>
    <text class="title" x="335" y="65" text-anchor="middle" font-size="58">上海 → 苏州一晚</text>
  </g>
  <g transform="translate(205 305)">
    <rect class="blue" x="0" y="0" rx="26" ry="26" width="490" height="58"/>
    <text class="hand small" x="245" y="40" text-anchor="middle">旗袍园林拍照｜金鸡湖夜景｜中午返程</text>
  </g>

  <g transform="translate(58 390)">
    <rect class="cream" x="0" y="0" rx="24" ry="24" width="340" height="165"/>
    <rect class="red" x="0" y="0" rx="24" ry="24" width="340" height="56"/>
    <text class="hand card-title" x="30" y="39" fill="#fff">交通卡</text>
    <text class="hand body" x="30" y="103">上海 → 苏州</text>
    <text class="hand small" x="30" y="145">高铁约 25-45 分钟</text>
  </g>

  <g transform="translate(480 382)">
    <rect class="sticker" x="0" y="0" rx="28" ry="28" width="330" height="205"/>
    <rect x="18" y="18" width="294" height="150" rx="18" fill="#d8e6dd"/>
    <path d="M 38 143 C 100 72, 178 78, 293 143" fill="none" stroke="#3e6b54" stroke-width="9"/>
    <path d="M 64 132 L 88 84 L 112 132 M 130 132 L 154 78 L 178 132 M 196 132 L 220 88 L 244 132" fill="none" stroke="#406e56" stroke-width="6"/>
    <text class="hand small" x="165" y="194" text-anchor="middle">苏州站 / 到达</text>
  </g>

  <g transform="translate(75 620)">
    <rect class="sticker" x="0" y="0" rx="28" ry="28" width="360" height="250"/>
    <rect x="22" y="22" width="316" height="180" rx="18" fill="#e9d9c5"/>
    <path d="M 70 184 L 70 100 Q 180 48 290 100 L 290 184" fill="#fff8ee" stroke="#222" stroke-width="6"/>
    <path d="M 92 112 L 268 112 M 110 145 L 250 145 M 132 76 Q 180 42 228 76" stroke="#222" stroke-width="5" fill="none"/>
    <text class="hand small" x="180" y="233" text-anchor="middle">平江路妆造</text>
  </g>

  <g transform="translate(500 670)">
    <rect class="cream" x="0" y="0" rx="24" ry="24" width="310" height="170"/>
    <text class="hand card-title" x="25" y="48">时间提醒</text>
    <text class="hand small" x="25" y="93">妆造预留 1.5-2h</text>
    <text class="hand small" x="25" y="133">雨天带伞 + 防滑鞋</text>
  </g>

  <g transform="translate(105 925)">
    <rect class="sticker" x="0" y="0" rx="28" ry="28" width="315" height="230"/>
    <rect x="22" y="22" width="271" height="160" rx="18" fill="#d7e2c2"/>
    <circle cx="115" cy="96" r="42" fill="#8fa36e"/>
    <circle cx="182" cy="105" r="52" fill="#6f8557"/>
    <path d="M 55 162 C 120 115, 190 190, 260 132" stroke="#fff" stroke-width="9" fill="none"/>
    <text class="hand small" x="158" y="214" text-anchor="middle">狮子林园林拍照</text>
  </g>

  <g transform="translate(500 920)">
    <rect class="cream" x="0" y="0" rx="24" ry="24" width="315" height="180"/>
    <text class="hand card-title" x="25" y="49">门票 / 开放</text>
    <text class="hand small" x="25" y="95">提前预约，闭园前入内</text>
    <text class="hand small" x="25" y="137">旗袍照优先走廊窗景</text>
  </g>

  <g transform="translate(95 1210)">
    <rect class="cream" x="0" y="0" rx="24" ry="24" width="330" height="150"/>
    <text class="hand card-title" x="26" y="48">苏式小吃</text>
    <text class="hand small" x="26" y="92">苏式面 / 生煎 / 糕团</text>
    <text class="hand small" x="26" y="130">建议补充，需复核营业</text>
  </g>

  <g transform="translate(505 1165)">
    <rect class="sticker" x="0" y="0" rx="28" ry="28" width="320" height="245"/>
    <rect x="20" y="20" width="280" height="170" rx="18" fill="#17334b"/>
    <path d="M 35 158 C 110 120, 195 120, 285 158" stroke="#f2d073" stroke-width="8" fill="none"/>
    <circle cx="230" cy="65" r="28" fill="#f7e6a3"/>
    <path d="M 55 148 L 55 88 L 95 88 L 95 148 M 122 148 L 122 70 L 170 70 L 170 148 M 198 148 L 198 96 L 260 96 L 260 148" fill="none" stroke="#fff" stroke-width="6"/>
    <text class="hand small" x="160" y="226" text-anchor="middle">金鸡湖夜景</text>
  </g>

  <g transform="translate(80 1415)">
    <rect class="blue" x="0" y="0" rx="28" ry="28" width="350" height="86"/>
    <text class="hand small" x="175" y="55" text-anchor="middle">Day2 睡到中午 → 回上海</text>
  </g>
  <g transform="translate(505 1430)">
    <rect class="green" x="0" y="0" rx="28" ry="28" width="285" height="72"/>
    <text class="hand small" x="142" y="48" text-anchor="middle" fill="#fff">路线清楚优先</text>
  </g>

  <g transform="translate(48 116)">
    <circle cx="58" cy="58" r="45" fill="#fff" stroke="#222" stroke-width="5"/>
    <path d="M 34 52 Q 58 30 82 52" stroke="#222" stroke-width="5" fill="none"/>
    <circle cx="44" cy="62" r="5" fill="#222"/>
    <circle cx="72" cy="62" r="5" fill="#222"/>
    <path d="M 44 82 Q 58 92 74 82" stroke="#222" stroke-width="4" fill="none"/>
    <text class="hand small" x="0" y="132">通用旅行搭子</text>
  </g>
  <g transform="translate(735 116)">
    <circle cx="58" cy="58" r="45" fill="#fff" stroke="#222" stroke-width="5"/>
    <path d="M 32 56 Q 58 34 84 56" stroke="#222" stroke-width="5" fill="none"/>
    <circle cx="44" cy="64" r="5" fill="#222"/>
    <circle cx="72" cy="64" r="5" fill="#222"/>
    <path d="M 43 83 Q 58 95 75 83" stroke="#222" stroke-width="4" fill="none"/>
  </g>

  <text class="hand small muted" x="450" y="1565" text-anchor="middle">Public-safe demo: no private character IP, no real personal itinerary data</text>
</svg>
